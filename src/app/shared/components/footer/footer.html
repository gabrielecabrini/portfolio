<footer>
  <div class="footer-inner">
    <span class="muted">© {{ year }} Gabriele Cabrini</span>
    <div class="footer-right">
      <a class="muted repo-link"
         href="/sitemap.xml"
         target="_blank"
         rel="noopener noreferrer">
        Sitemap
      </a>
      <a class="muted repo-link"
         href="https://github.com/gabrielecabrini/portfolio"
         target="_blank"
         rel="noopener noreferrer">
        v{{ version }} ↗
      </a>
      <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="'nav.switchTheme' | translate"
              data-umami-event="theme_toggle">
        {{ theme.theme() === 'dark' ? '☀' : '🌙' }}
      </button>
    </div>
  </div>
</footer>
