<header>
  <div class="header-inner">
    <a class="brand" routerLink="/">gc.</a>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ 'nav.home' | translate }}
      </a>
      <a routerLink="/about" routerLinkActive="active">
        {{ 'nav.about' | translate }}
      </a>
      <a routerLink="/experience" routerLinkActive="active">
        {{ 'nav.experience' | translate }}
      </a>
      <a routerLink="/projects" routerLinkActive="active">
        {{ 'nav.projects' | translate }}
      </a>
    </nav>
    <button class="lang-toggle" (click)="i18n.toggle()" [attr.aria-label]="'nav.switchLang' | translate"
            data-umami-event="lang_toggle">
      @if (i18n.lang() === 'it') {
        <img src="https://flagcdn.com/gb.svg" alt="" class="flag-icon" aria-hidden="true" /> EN
      } @else {
        <img src="https://flagcdn.com/it.svg" alt="" class="flag-icon" aria-hidden="true" /> IT
      }
    </button>
  </div>
</header>
