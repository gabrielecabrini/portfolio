<section class="about-page">
  <div class="about-inner">

    <div class="profile-row">
      <img class="avatar" src="assets/images/pfp.jpeg" alt="Gabriele Cabrini" decoding="async" />
      <div>
        <div class="section-header">
          <h2>{{ 'about.title' | translate }}</h2>
        </div>
        <div class="bio">
          <p>{{ 'about.bio' | translate }}</p>
        </div>
      </div>
    </div>

    <div class="section-header links-section-header">
      <h3>{{ 'about.links.title' | translate }}</h3>
    </div>

    <div class="links-grid">
      @for (link of links; track link.href; let i = $index) {
        <a [href]="link.href"
           [attr.target]="link.target ?? null"
           [attr.rel]="link.rel ?? null"
           class="link-card"
           [style.animation-delay]="(140 + i * 60) + 'ms'"
           data-umami-event="social_link_click"
           [attr.data-umami-event-name]="link.name">
          <span class="link-icon">
            <img [src]="link.iconUrl" [alt]="link.name" class="link-img" decoding="async" loading="lazy" />
          </span>
          <span class="link-name">{{ link.name }}</span>
          <span class="link-arrow">↗</span>
        </a>
      }
      <a routerLink="/cv" class="link-card cv-link" [style.animation-delay]="(140 + links.length * 60) + 'ms'">
        <span class="link-icon">
          <svg class="link-img" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span class="link-name">{{ 'about.cv.link' | translate }}</span>
        <span class="link-arrow">↗</span>
      </a>
    </div>

  </div>
</section>
